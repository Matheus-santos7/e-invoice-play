# Infra local: PostgreSQL para o Prisma (backend).
# Uso: pnpm docker:up  →  configure backend/.env  →  pnpm db:setup

services:
  postgres:
    image: postgres:16-alpine
    container_name: e-invoice-play-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-einvoice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-einvoice}
      POSTGRES_DB: ${POSTGRES_DB:-e_invoice_play}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    name: e-invoice-play-postgres-data
